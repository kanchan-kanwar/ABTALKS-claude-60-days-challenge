<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Admission Readiness Simulator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
  .fade-in { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:translateY(0);} }
  .progress-fill { transition: width .5s cubic-bezier(.4,0,.2,1); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<div id="app" class="max-w-5xl mx-auto px-4 py-8"></div>

<script>
/* ============================= STATE ============================= */
const S = {
  screen: 'setup', // setup | dashboard
  setup: { provider:'', attending:'', diagnosis:'', admitType:'', paInitial:'', admitDate:'' },
  cats: {
    pa: { pct:0, status:'not_started' },        // not_started/pending/approved/denied
    insurance: { pct:0 },
    bed: { pct:0 },
    documentation: { pct:0 },
    orders: { pct:0 },
    consent: { pct:0 }
  },
  appealSubmitted: false,
  log: [],
  finalized: false
};

const WEIGHTS = { pa:0.25, documentation:0.20, orders:0.20, insurance:0.15, consent:0.10, bed:0.10 };

const DIAGNOSES = ["Acute MI","CHF","Pneumonia","Elective Surgery","Hip Fracture"];
const ADMIT_TYPES = ["Inpatient","Observation","Emergency","ICU","Same-Day Surgery"];

/* ============================= HELPERS ============================= */
function readiness() {
  let score = 0;
  for (const k in WEIGHTS) score += (S.cats[k].pct/100) * WEIGHTS[k] * 100;
  // Denied PA + ICU cannot reach 70% from admin tasks alone
  if (S.cats.pa.status === 'denied' && S.setup.admitType === 'ICU') {
    score = Math.min(score, 69);
  }
  return Math.round(score);
}

function riskLevel(pct) {
  if (pct >= 80) return { label:'Low', color:'emerald' };
  if (pct >= 45) return { label:'Moderate', color:'amber' };
  return { label:'High', color:'rose' };
}

function badge(status) {
  const map = {
    approved: 'bg-emerald-100 text-emerald-700 border-emerald-300',
    pending: 'bg-amber-100 text-amber-700 border-amber-300',
    denied: 'bg-rose-100 text-rose-700 border-rose-300',
    not_started: 'bg-slate-100 text-slate-600 border-slate-300',
    complete: 'bg-emerald-100 text-emerald-700 border-emerald-300',
    partial: 'bg-amber-100 text-amber-700 border-amber-300'
  };
  return map[status] || map.not_started;
}

function catStatusLabel(pct) {
  if (pct >= 100) return { text:'Complete', cls:'complete' };
  if (pct > 0) return { text:'In Progress', cls:'partial' };
  return { text:'Not Started', cls:'not_started' };
}

function bump(cat, amt) {
  S.cats[cat].pct = Math.min(100, S.cats[cat].pct + amt);
  render();
}

function seedInitialAnalysis() {
  // randomize PA branch
  const roll = Math.random();
  if (roll < 0.35) S.cats.pa.status = 'approved';
  else if (roll < 0.75) S.cats.pa.status = 'pending';
  else S.cats.pa.status = 'denied';
  S.cats.pa.pct = S.cats.pa.status === 'approved' ? 100 : (S.cats.pa.status === 'pending' ? 40 : 15);

  S.cats.insurance.pct = 30 + Math.floor(Math.random()*30);
  S.cats.bed.pct = 20 + Math.floor(Math.random()*30);
  S.cats.documentation.pct = 15 + Math.floor(Math.random()*30);
  S.cats.orders.pct = 20 + Math.floor(Math.random()*30);
  S.cats.consent.pct = 10 + Math.floor(Math.random()*40);

  // clamp overall into 30-60% band by scaling if needed
  let attempts = 0;
  while ((readiness() < 30 || readiness() > 60) && attempts < 50) {
    const r = readiness();
    const delta = r < 30 ? 5 : -5;
    ['insurance','bed','documentation','orders','consent'].forEach(k=>{
      S.cats[k].pct = Math.max(0, Math.min(100, S.cats[k].pct + delta));
    });
    attempts++;
  }
}

function appealPA() {
  S.appealSubmitted = true;
  // successful appeal converts to approved
  S.cats.pa.status = 'approved';
  S.cats.pa.pct = 100;
  render();
}

/* ============================= RENDER: SETUP ============================= */
function renderSetup() {
  const s = S.setup;
  return `
  <div class="fade-in">
    <div class="mb-8">
      <h1 class="text-2xl font-semibold text-slate-900">🏥 Hospital Admission Readiness Simulator</h1>
      <p class="text-slate-500 text-sm mt-1">Training simulation for Hospital Admission Coordinators. All provider and payer names below are illustrative training data.</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-5">
      <h2 class="font-medium text-slate-900 text-sm uppercase tracking-wide text-slate-500">Admission Setup</h2>

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Provider <span class="text-xs text-slate-400">(illustrative)</span></label>
          <input id="f_provider" value="${s.provider}" placeholder="e.g. Meridian Health Network" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Attending Physician <span class="text-xs text-slate-400">(illustrative)</span></label>
          <input id="f_attending" value="${s.attending}" placeholder="e.g. Dr. A. Ramirez" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"/>
        </div>
      </div>

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Diagnosis</label>
          <select id="f_diagnosis" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
            <option value="">Select diagnosis</option>
            ${DIAGNOSES.map(d=>`<option ${s.diagnosis===d?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Admission Type</label>
          <select id="f_admitType" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
            <option value="">Select admission type</option>
            ${ADMIT_TYPES.map(a=>`<option ${s.admitType===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
      </div>

      ${s.admitType === 'Observation' ? `
      <div class="bg-amber-50 border border-amber-300 rounded-lg p-3 text-sm text-amber-800">
        <strong>CMS 2-Midnight Rule applies</strong> — different cost-sharing, SNF eligibility, and billing than inpatient. Medicare patients require written MOON notification.
      </div>` : ''}

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">PA Status (at intake)</label>
          <select id="f_paInitial" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
            <option value="">Unknown / To be determined</option>
            <option ${s.paInitial==='Requested'?'selected':''}>Requested</option>
            <option ${s.paInitial==='Not yet submitted'?'selected':''}>Not yet submitted</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Admission Date</label>
          <input id="f_admitDate" type="date" value="${s.admitDate}" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"/>
        </div>
      </div>

      <div class="pt-2">
        <button id="btn_analyze" class="w-full sm:w-auto bg-sky-600 hover:bg-sky-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm transition">🏥 Analyze Admission Readiness</button>
      </div>
    </div>
  </div>`;
}

/* ============================= RENDER: DASHBOARD ============================= */
function catCard(key, label, icon, actions) {
  const c = S.cats[key];
  const st = catStatusLabel(c.pct);
  return `
  <div class="bg-white rounded-xl border border-slate-200 p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-medium text-slate-700">${icon} ${label}</span>
      <span class="text-xs px-2 py-0.5 rounded-full border ${badge(st.cls)}">${st.text}</span>
    </div>
    <div class="w-full bg-slate-100 rounded-full h-2 mb-3">
      <div class="progress-fill bg-sky-500 h-2 rounded-full" style="width:${c.pct}%"></div>
    </div>
    <div class="flex flex-wrap gap-2">${actions}</div>
  </div>`;
}

function actionBtn(label, onclick) {
  return `<button onclick="${onclick}" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-sky-100 hover:text-sky-700 text-slate-600 border border-slate-200 transition">${label}</button>`;
}

function paSection() {
  const pa = S.cats.pa;
  let branchActions = '';
  if (pa.status === 'pending') {
    branchActions = [
      actionBtn('Follow Up', "bump('pa',20)"),
      actionBtn('Upload Docs', "bump('pa',15); bump('documentation',10)"),
      actionBtn('Contact Physician', "bump('pa',10); bump('orders',10)")
    ].join('');
  } else if (pa.status === 'denied') {
    branchActions = `
      ${actionBtn('Review Reason', "S.paReasonViewed=true; render()")}
      ${actionBtn('Contact Insurance', "bump('insurance',10)")}
      ${!S.appealSubmitted ? actionBtn('Submit Appeal', "appealPA()") : `<span class="text-xs text-emerald-600 font-medium px-2 py-1">Appeal successful — PA Approved</span>`}
    `;
  } else if (pa.status === 'approved') {
    branchActions = `<span class="text-xs text-emerald-600 font-medium px-2 py-1">✓ Continue with admission workflow</span>`;
  }
  return `
  <div class="bg-white rounded-xl border border-slate-200 p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-medium text-slate-700">📋 Prior Authorization</span>
      <span class="text-xs px-2 py-0.5 rounded-full border ${badge(pa.status)}">${pa.status.replace('_',' ')}</span>
    </div>
    <div class="w-full bg-slate-100 rounded-full h-2 mb-3">
      <div class="progress-fill bg-sky-500 h-2 rounded-full" style="width:${pa.pct}%"></div>
    </div>
    ${pa.status==='denied' && S.paReasonViewed ? `<p class="text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-2 mb-2">Denial reason (illustrative): Documentation submitted did not meet InterQual medical necessity criteria for requested level of care.</p>` : ''}
    <div class="flex flex-wrap gap-2">${branchActions}</div>
  </div>`;
}

function riskCard(label, pct, weighted) {
  const r = riskLevel(pct);
  const colorMap = { emerald:'text-emerald-700 bg-emerald-50 border-emerald-200', amber:'text-amber-700 bg-amber-50 border-amber-200', rose:'text-rose-700 bg-rose-50 border-rose-200' };
  return `
  <div class="rounded-lg border ${colorMap[r.color]} p-3">
    <div class="flex justify-between items-center text-xs">
      <span class="font-medium">${label}${weighted ? ' <span class="opacity-60">(weighted ↑)</span>' : ''}</span>
      <span class="font-semibold">${r.label}</span>
    </div>
  </div>`;
}

function timelineItem(label, done) {
  return `
  <div class="flex items-center gap-2">
    <div class="w-3 h-3 rounded-full ${done ? 'bg-sky-500' : 'bg-slate-200'} flex-shrink-0"></div>
    <span class="text-xs ${done ? 'text-slate-800 font-medium' : 'text-slate-400'}">${label}</span>
  </div>`;
}

function coordCard(role, icon, desc) {
  return `
  <div class="bg-white rounded-xl border border-slate-200 p-4">
    <div class="text-sm font-medium text-slate-800 mb-1">${icon} ${role}</div>
    <p class="text-xs text-slate-500 leading-relaxed">${desc}</p>
  </div>`;
}

function renderDashboard() {
  const s = S.setup;
  const score = readiness();
  const isHighRisk = ['Acute MI','CHF'].includes(s.diagnosis) || s.admitType === 'ICU';

  const missing = [];
  if (S.cats.pa.status !== 'approved') missing.push('Prior Authorization not approved');
  if (S.cats.insurance.pct < 100) missing.push('Insurance verification incomplete');
  if (S.cats.bed.pct < 100) missing.push('Bed assignment incomplete');
  if (S.cats.documentation.pct < 100) missing.push('Clinical documentation incomplete');
  if (S.cats.orders.pct < 100) missing.push('Physician orders incomplete');
  if (S.cats.consent.pct < 100) missing.push('Consent not finalized');

  return `
  <div class="fade-in space-y-6">
    <div class="flex items-start justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-semibold text-slate-900">Admission Readiness Dashboard</h1>
        <p class="text-sm text-slate-500 mt-0.5">${s.diagnosis} · ${s.admitType} · Attending: ${s.attending || '—'} <span class="text-slate-400">(illustrative)</span> · Provider: ${s.provider || '—'} <span class="text-slate-400">(illustrative)</span></p>
      </div>
      <button onclick="resetApp()" class="text-xs px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">↺ New Admission</button>
    </div>

    ${s.admitType === 'Observation' ? `
    <div class="bg-amber-50 border border-amber-300 rounded-lg p-3 text-sm text-amber-800">
      <strong>CMS 2-Midnight Rule applies</strong> — different cost-sharing, SNF eligibility, and billing than inpatient. Medicare patients require written MOON notification.
    </div>` : ''}

    ${['Acute MI','CHF'].includes(s.diagnosis) ? `
    <div class="bg-sky-50 border border-sky-300 rounded-lg p-3 text-sm text-sky-800">
      <strong>Medical necessity criteria:</strong> InterQual/Milliman thresholds apply — ensure documentation meets medical necessity standards before UR review.
    </div>` : ''}

    <!-- Readiness Score -->
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-slate-600">Readiness Score</span>
        <span class="text-2xl font-bold ${score>=90?'text-emerald-600':score>=75?'text-sky-600':score>=45?'text-amber-600':'text-rose-600'}">${score}%</span>
      </div>
      <div class="w-full bg-slate-100 rounded-full h-3">
        <div class="progress-fill h-3 rounded-full ${score>=90?'bg-emerald-500':score>=75?'bg-sky-500':score>=45?'bg-amber-500':'bg-rose-500'}" style="width:${score}%"></div>
      </div>
      <p class="text-xs text-slate-400 mt-2">Weighting — PA 25% · Documentation 20% · Physician Orders 20% · Insurance 15% · Consent 10% · Bed 10%</p>
    </div>

    <!-- Status Cards -->
    <div>
      <h2 class="text-xs uppercase tracking-wide font-medium text-slate-500 mb-2">Status</h2>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${paSection()}
        ${catCard('insurance','Insurance','💳', actionBtn('Verify Insurance', "bump('insurance',30)"))}
        ${catCard('bed','Bed Assignment','🛏️', actionBtn('Assign Bed', "bump('bed',35)"))}
        ${catCard('documentation','Clinical Documentation','📄', actionBtn('Upload Documentation', "bump('documentation',30)"))}
        ${catCard('orders','Physician Orders','🩺', actionBtn('Contact Physician', "bump('orders',30)"))}
        ${catCard('consent','Consent','✍️', actionBtn('Complete Consent', "bump('consent',40)"))}
      </div>
    </div>

    <!-- Additional Workflow Actions -->
    <div>
      <h2 class="text-xs uppercase tracking-wide font-medium text-slate-500 mb-2">Workflow Actions</h2>
      <div class="flex flex-wrap gap-2">
        ${actionBtn('Notify Nursing', "S.notified=true; render()")}
        ${actionBtn('Prepare Patient Arrival', "S.arrivalPrepped=true; render()")}
      </div>
      <div class="mt-2 flex gap-2 flex-wrap">
        ${S.notified ? `<span class="text-xs text-emerald-600">✓ Nursing notified</span>` : ''}
        ${S.arrivalPrepped ? `<span class="text-xs text-emerald-600">✓ Patient arrival prepared</span>` : ''}
      </div>
    </div>

    <!-- Timeline -->
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h2 class="text-xs uppercase tracking-wide font-medium text-slate-500 mb-3">Admission Timeline</h2>
      <div class="grid grid-cols-3 sm:grid-cols-5 gap-y-3 gap-x-2">
        ${timelineItem('PA Review', S.cats.pa.status==='approved')}
        ${timelineItem('Insurance Verification', S.cats.insurance.pct>=100)}
        ${timelineItem('Bed Assignment', S.cats.bed.pct>=100)}
        ${timelineItem('Documentation', S.cats.documentation.pct>=100)}
        ${timelineItem('Consent', S.cats.consent.pct>=100)}
        ${timelineItem('Patient Arrival', !!S.arrivalPrepped)}
        ${timelineItem('Registration', !!S.arrivalPrepped && S.cats.insurance.pct>=100)}
        ${timelineItem('Clinical Assessment', !!S.notified && S.cats.orders.pct>=100)}
        ${timelineItem('Admission Complete', score>=90)}
      </div>
    </div>

    <!-- Care Coordination -->
    <div>
      <h2 class="text-xs uppercase tracking-wide font-medium text-slate-500 mb-2">Care Coordination</h2>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${coordCard('Attending', '👨‍⚕️', (s.attending||'Illustrative attending')+' — oversees clinical plan of care and signs required physician orders.')}
        ${coordCard('Case Manager', '🗂️', 'Coordinates admission logistics, payer communication, and discharge planning readiness.')}
        ${coordCard('Nursing', '🩹', 'Confirms bed readiness, unit assignment, and patient care handoff.')}
        ${coordCard('Utilization Review', '🔍', 'Performs concurrent review and denial risk identification, applying InterQual and Milliman criteria to support medical necessity.')}
        ${coordCard('Discharge Planner', '🏠', 'Begins early discharge planning to reduce length-of-stay and readmission risk.')}
      </div>
    </div>

    <!-- Risk Tracking -->
    <div>
      <h2 class="text-xs uppercase tracking-wide font-medium text-slate-500 mb-2">Risk Tracking</h2>
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
        ${riskCard('Documentation Risk', S.cats.documentation.pct, isHighRisk)}
        ${riskCard('Insurance Risk', S.cats.insurance.pct)}
        ${riskCard('Bed Risk', S.cats.bed.pct)}
        ${riskCard('Clinical Risk', Math.round((S.cats.documentation.pct + S.cats.orders.pct)/2 - (isHighRisk?15:0)), isHighRisk)}
      </div>
    </div>

    ${score >= 75 ? `
    <div class="bg-slate-800 text-slate-100 rounded-xl p-4 text-sm">
      <div class="font-medium mb-1">📊 Governance Snapshot <span class="text-slate-400 text-xs">(industry benchmarks, estimates only)</span></div>
      <p class="text-slate-300 text-xs leading-relaxed">PA turnaround 3–5 days · Inpatient denial rate ~8–10% (CMS) · PA rework cost ~$11/transaction (CAQH)</p>
    </div>` : ''}

    <!-- Final Decision -->
    <div class="rounded-xl border p-5 ${score>=90 ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-200'}">
      ${score >= 90 ? `
      <div class="flex items-center gap-2 mb-2">
        <span class="text-2xl">✅</span>
        <span class="text-lg font-semibold text-emerald-700">Admit</span>
      </div>
      <p class="text-sm text-emerald-800 mb-3">All admission readiness criteria have been met at ${score}% readiness.</p>
      <div class="text-xs text-emerald-800 space-y-1">
        <div>• PA Status: ${S.cats.pa.status}</div>
        <div>• Diagnosis: ${s.diagnosis} · Admission Type: ${s.admitType}</div>
        <div>• Insurance, Bed, Documentation, Orders, and Consent all complete</div>
        <div>• Attending: ${s.attending||'—'} (illustrative) · Admission Date: ${s.admitDate||'—'}</div>
      </div>` : `
      <div class="flex items-center gap-2 mb-2">
        <span class="text-2xl">⚠</span>
        <span class="text-lg font-semibold text-amber-700">Not Ready</span>
      </div>
      <p class="text-sm text-slate-600 mb-3">Current readiness: ${score}% — below the 90% threshold required for admission.</p>
      <div class="text-xs text-slate-700">
        <div class="font-medium mb-1">Missing Items:</div>
        <ul class="list-disc list-inside space-y-0.5 mb-3">
          ${missing.map(m=>`<li>${m}</li>`).join('') || '<li>None — finalize remaining checks</li>'}
        </ul>
        <div class="font-medium mb-1">Required Actions:</div>
        <ul class="list-disc list-inside space-y-0.5">
          ${S.cats.pa.status==='denied' ? '<li>Resolve PA denial via appeal or insurance contact</li>' : ''}
          ${S.cats.pa.status==='pending' ? '<li>Follow up on pending PA</li>' : ''}
          <li>Complete remaining workflow actions above</li>
        </ul>
      </div>`}
    </div>
  </div>`;
}

/* ============================= MAIN RENDER ============================= */
function render() {
  const el = document.getElementById('app');
  el.innerHTML = S.screen === 'setup' ? renderSetup() : renderDashboard();
  if (S.screen === 'setup') bindSetupEvents();
}

function bindSetupEvents() {
  ['provider','attending','diagnosis','admitType','paInitial','admitDate'].forEach(k=>{
    const elm = document.getElementById('f_'+k);
    if (!elm) return;
    elm.addEventListener('input', ()=>{ S.setup[k]=elm.value; if(k==='admitType'||k==='diagnosis') render(); });
    elm.addEventListener('change', ()=>{ S.setup[k]=elm.value; if(k==='admitType'||k==='diagnosis') render(); });
  });
  document.getElementById('btn_analyze').addEventListener('click', ()=>{
    if (!S.setup.diagnosis || !S.setup.admitType) {
      alert('Please select a diagnosis and admission type before analyzing.');
      return;
    }
    seedInitialAnalysis();
    S.screen = 'dashboard';
    render();
  });
}

function resetApp() {
  S.screen = 'setup';
  S.cats = { pa:{pct:0,status:'not_started'}, insurance:{pct:0}, bed:{pct:0}, documentation:{pct:0}, orders:{pct:0}, consent:{pct:0} };
  S.appealSubmitted = false;
  S.notified = false;
  S.arrivalPrepped = false;
  S.paReasonViewed = false;
  render();
}

render();
</script>
</body>
</html>
